name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Private GHCR image tag to deploy, for example v0.0.1"
        required: true

permissions:
  contents: read
  packages: read

env:
  APP_PORT: ${{ vars.APP_PORT || '8080' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/hoorayhug-image' }}
  SSH_PORT: ${{ vars.SERVER_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare image reference
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ref=ghcr.io/${owner}/hoorayhug-image:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/hoorayhug-image
          chmod 600 ~/.ssh/hoorayhug-image
          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh -i ~/.ssh/hoorayhug-image -p "$SSH_PORT" "$remote" "mkdir -p '$DEPLOY_PATH/data' '$DEPLOY_PATH/imgs'"

          cat > .deploy.env <<EOF
          APP_PORT=${APP_PORT}
          IMAGE_REF=${IMAGE_REF}
          EOF

          scp -i ~/.ssh/hoorayhug-image -P "$SSH_PORT" docker-compose.prod.yml "$remote:$DEPLOY_PATH/docker-compose.yml"
          scp -i ~/.ssh/hoorayhug-image -P "$SSH_PORT" .deploy.env "$remote:$DEPLOY_PATH/.env"

      - name: Pull image and restart service
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          remote="${SERVER_USER}@${SERVER_HOST}"
          if [ -z "$GHCR_TOKEN" ]; then
            echo "GHCR_TOKEN is required because the image is private."
            exit 1
          fi

          username="${GHCR_USERNAME:-$GITHUB_ACTOR}"
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/hoorayhug-image -p "$SSH_PORT" "$remote" "docker login ghcr.io -u '$username' --password-stdin"

          ssh -i ~/.ssh/hoorayhug-image -p "$SSH_PORT" "$remote" "cd '$DEPLOY_PATH' && docker compose pull && docker compose up -d && docker image prune -f"
